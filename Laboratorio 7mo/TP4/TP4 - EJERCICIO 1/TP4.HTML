<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Formulario de Inscripción</title>
</head>

<body style="font-family:Arial; margin:30px;">

<h1><u>Formulario de Inscripción</u></h1>

<p>
Complete el siguiente formulario para inscribirse a los talleres
extracurriculares de tecnología
</p>

<hr>

<form>

<fieldset>

<legend><b>Datos personales</b></legend>

<br>

<label for="nombre">Nombre completo:</label>
<br>
<input type="text" id="nombre" name="nombre"
required minlength="3">

<br><br>

<label for="email">Email:</label>
<br>
<input type="email" id="email" name="email"
required>

<br><br>

<label for="edad">Edad:</label>
<br>
<input type="number" id="edad" name="edad"
min="12">

<br><br>

<label for="curso">Curso:</label>
<br>

<select id="curso" name="curso">

<option>1°</option>
<option>2°</option>
<option>3°</option>
<option>4°</option>
<option>5°</option>
<option>6°</option>
<option>7°</option>

</select>

<br><br>

</fieldset>

<br>

<fieldset>

<legend><b>Turno</b></legend>

<input type="radio" id="mañana" name="turno">
<label for="mañana">Mañana</label>

<br>

<input type="radio" id="tarde" name="turno">
<label for="tarde">Tarde</label>

</fieldset>

<br>

<fieldset>

<legend><b>Talleres de interés</b></legend>

<input type="checkbox" id="programacion">
<label for="programacion">Programación</label>

<br>

<input type="checkbox" id="robotica">
<label for="robotica">Robótica</label>

<br>

<input type="checkbox" id="diseño">
<label for="diseño">Diseño Web</label>

<br>

<input type="checkbox" id="electronica">
<label for="electronica">Electrónica</label>

</fieldset>

<br>

<fieldset>

<legend><b>Información adicional</b></legend>

<label for="fecha">Fecha de inscripción:</label>

<br>

<input type="date" id="fecha">

<br><br>

<label for="comentarios">Comentarios adicionales:</label>

<br>

<textarea id="comentarios"
rows="5"
cols="40">
</textarea>

</fieldset>

<br>

<input type="submit" value="Inscribirse">

</form>

</body>
</html>
